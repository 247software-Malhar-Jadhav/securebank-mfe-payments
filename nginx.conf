# ---------------------------------------------------------------------------
# nginx config for serving the BUILT payments remote in production.
#
# Two jobs:
#   1. Serve the static SPA assets, INCLUDING the federation manifest
#      `assets/remoteEntry.js`, with PERMISSIVE CORS so the shell (a different
#      origin) can fetch it cross-origin.
#   2. (Optional) proxy /api to the gateway so the remote also works when
#      browsed standalone in a deployed environment. When embedded, the shell's
#      own origin serves /api, so this is just a convenience/fallback.
# ---------------------------------------------------------------------------

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- CORS for federation -----------------------------------------------
    # The shell fetches remoteEntry.js and the chunk files cross-origin. These
    # headers must be present on the JS assets (and the preflight) or the
    # browser blocks the load with a CORS error.
    location /assets/ {
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Answer CORS preflight cheaply.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }

        # Hashed asset filenames are immutable and may be cached aggressively,
        # but remoteEntry.js itself must NOT be cached so the shell always sees
        # the latest exposes map.
        location = /assets/remoteEntry.js {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files $uri =404;
        }

        try_files $uri =404;
    }

    # ---- API proxy (standalone convenience) --------------------------------
    location /api/ {
        proxy_pass         http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- SPA fallback ------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
